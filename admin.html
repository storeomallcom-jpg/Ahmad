<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProfitPilot Admin | لوحة التحكم</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #3498db;
            --danger: #e74c3c;
            --success: #2ecc71;
            --dark: #2c3e50;
            --light: #ecf0f1;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; margin: 0; padding: 20px; color: var(--dark); }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--light); padding-bottom: 20px; margin-bottom: 30px; }
        h1 { margin: 0; font-size: 24px; color: var(--primary); }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--primary); color: white; padding: 20px; border-radius: 12px; text-align: center; transition: transform 0.3s; }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-card h3 { margin: 10px 0 0; font-size: 28px; }
        .stat-card p { margin: 0; opacity: 0.8; font-size: 14px; }

        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid var(--light); }
        th { background-color: #fafafa; font-weight: 600; color: #7f8c8d; }
        tr:hover { background-color: #fdfdfd; }

        .badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .verified { background: #d4edda; color: #155724; }
        .not-verified { background: #f8d7da; color: #721c24; }

        #error-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; justify-content: center; align-items: center; text-align: center; flex-direction: column; }
        #error-overlay h2 { color: var(--danger); }
        .loading { text-align: center; padding: 50px; font-size: 18px; color: var(--primary); }
    </style>
</head>
<body>

<div id="error-overlay">
    <h2 id="error-title">⛔ الوصول ممنوع</h2>
    <p id="error-desc">هذه اللوحة مخصصة للمدير فقط.</p>
    <a href="/" style="color: var(--primary);">العودة للرئيسية</a>
</div>

<div class="container" id="main-content">
    <header>
        <h1>🚀 ProfitPilot Analytics</h1>
        <div id="admin-name" style="font-size: 14px; font-weight: bold;">جاري التحقق...</div>
    </header>

    <div id="loading-state" class="loading">جاري جلب بيانات المستخدمين...</div>

    <div id="dashboard-data" style="display: none;">
        <div class="stats-grid">
            <div class="stat-card">
                <p>إجمالي المستخدمين</p>
                <h3 id="total-users">0</h3>
            </div>
            <div class="stat-card" style="background: var(--dark);">
                <p>عمليات الحساب (Usage)</p>
                <h3 id="total-usage">0</h3>
            </div>
            <div class="stat-card" style="background: var(--success);">
                <p>المستخدمين النشطين</p>
                <h3 id="active-users">0</h3>
            </div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>المستخدم</th>
                        <th>البريد الإلكتروني</th>
                        <th>الحالة</th>
                        <th>تاريخ الانضمام</th>
                        <th>الاستخدام</th>
                    </tr>
                </thead>
                <tbody id="users-list">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // بيانات الربط بقاعدة البيانات (تم تصحيح اسم المتغير)
    const SUPABASE_URL  = 'https://knjdwpmnjdugprpdvouk.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuamR3cG1uamR1Z3BycGR2b3VrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTk4NzIsImV4cCI6MjA4ODI5NTg3Mn0.GFasEikuMc03IbTre3XxNDxUNi1WMXIbt-b2FQW7_Uc';
    
    // إنشاء الاتصال
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function initDashboard() {
        const { data: { user }, error } = await supabaseClient.auth.getUser();

        // التحقق من الهوية لتأمين لوحة التحكم
        if (error || !user || user.email !== 'ahmadzaoujal2009@gmail.com') {
            document.getElementById('error-overlay').style.display = 'flex';
            document.getElementById('main-content').style.display = 'none';
            return;
        }

        document.getElementById('admin-name').innerText = "مرحباً أحمد 👋";

        // جلب البيانات من جدول profiles
        const { data: profiles, error: dbError } = await supabaseClient
            .from('profiles')
            .select('*')
            .order('created_at', { ascending: false });

        if (dbError) {
            console.error(dbError);
            alert("فشل في جلب البيانات من قاعدة البيانات.");
            return;
        }

        renderData(profiles);
    }

    function renderData(profiles) {
        document.getElementById('loading-state').style.display = 'none';
        document.getElementById('dashboard-data').style.display = 'block';

        // حساب الإحصائيات الرياضية للمستخدمين
        document.getElementById('total-users').innerText = profiles.length;
        const totalUsage = profiles.reduce((sum, p) => sum + (p.usage_count || 0), 0);
        document.getElementById('total-usage').innerText = totalUsage;
        
        const activeCount = profiles.filter(p => (p.usage_count || 0) > 0).length;
        document.getElementById('active-users').innerText = activeCount;

        // ملء الجدول ديناميكياً
        const list = document.getElementById('users-list');
        list.innerHTML = '';

        profiles.forEach(p => {
            const date = new Date(p.created_at).toLocaleDateString('ar-MA');
            const statusClass = p.is_verified ? 'verified' : 'not-verified';
            const statusText = p.is_verified ? 'مؤكد' : 'منتظر';

            list.innerHTML += `
                <tr>
                    <td><strong>${p.full_name || 'مستخدم جديد'}</strong></td>
                    <td>${p.email || 'غير متوفر'}</td>
                    <td><span class="badge ${statusClass}">${statusText}</span></td>
                    <td>${date}</td>
                    <td>${p.usage_count || 0}</td>
                </tr>
            `;
        });
    }

    // بدء تشغيل النظام عند تحميل الصفحة
    window.onload = initDashboard;
</script>

</body>
</html>
